<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人财务仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1440px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a2634;
        }
        .header-left .subtitle {
            color: #6b7a8f;
            font-size: 14px;
            margin-top: 4px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary {
            background: #2d7aff;
            color: white;
        }
        .btn-primary:hover {
            background: #1a5fd0;
        }
        .btn-success {
            background: #22a67e;
            color: white;
        }
        .btn-success:hover {
            background: #1a8a66;
        }
        .status-badge {
            background: white;
            border-radius: 40px;
            padding: 8px 20px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-badge .dot.loading {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        .status-badge .dot.success {
            background: #22a67e;
        }
        .status-badge .dot.error {
            background: #d1453b;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .month-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border-radius: 40px;
            padding: 6px 10px 6px 14px;
            border: 1px solid #e2e8f0;
        }
        .month-nav .month-nav-label {
            font-size: 13px;
            color: #6b7a8f;
            margin-right: 4px;
        }
        .month-nav input[type="month"] {
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #1a2634;
            background: transparent;
            font-family: inherit;
            padding: 2px 4px;
        }
        .month-nav input[type="month"]:focus {
            outline: none;
        }
        .btn-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #f1f4f8;
            color: #4a5a6e;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }
        .btn-icon:hover {
            background: #e2e8f0;
        }
        .btn-text {
            background: transparent;
            border: none;
            color: #2d7aff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .btn-text:hover {
            background: #eef4ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 18px 12px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            text-align: center;
        }
        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: #6b7a8f;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0b1a2b;
        }
        .stat-value.positive {
            color: #0c8f5e;
        }
        .stat-value.negative {
            color: #d1453b;
        }
        .stat-value.neutral {
            color: #2d3748;
        }
        .stat-sub {
            font-size: 12px;
            color: #8a9aa8;
            margin-top: 4px;
        }
        .account-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            font-size: 13px;
        }
        .account-item .name {
            color: #4a5a6e;
        }
        .account-item .balance {
            font-weight: 600;
        }
        .account-item .balance.positive {
            color: #0c8f5e;
        }
        .account-item .balance.negative {
            color: #d1453b;
        }
        .account-item .balance.neutral {
            color: #2d3748;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 8px;
        }
        .chart-box {
            background: white;
            border-radius: 16px;
            padding: 16px 12px 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
        }
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a2634;
            padding-left: 4px;
            margin-bottom: 2px;
        }
        .chart-title .chart-title-month {
            font-size: 12px;
            font-weight: 500;
            color: #8a9aa8;
            margin-left: 6px;
        }
        .chart-container {
            width: 100%;
            height: 340px;
        }
        .legend-tip {
            font-size: 12px;
            color: #6b7a8f;
            padding: 0 4px 6px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .legend-tip .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 4px;
        }
        .legend-tip .dot.green {
            border: 3px solid #22a67e;
            background: transparent;
        }
        .legend-tip .dot.red {
            border: 3px solid #d1453b;
            background: transparent;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 24px;
            padding: 32px 36px;
            max-width: 540px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h2 {
            font-size: 22px;
            color: #1a2634;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #8a9aa8;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #d1453b;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }
        .form-group label .required {
            color: #d1453b;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
            color: #1a2634;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2d7aff;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
        }
        .form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .form-checkbox label {
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            cursor: pointer;
            margin: 0;
        }
        .form-checkbox .hint {
            font-size: 12px;
            color: #8a9aa8;
            font-weight: 400;
        }
        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            color: #4a5a6e;
        }
        .btn-outline:hover {
            background: #f1f4f8;
        }

        .transfer-fields {
            background: #f8f9fc;
            border-radius: 12px;
            padding: 14px;
            margin: 10px 0 4px;
            border: 1px dashed #d0d7e2;
        }
        .transfer-fields .form-group {
            margin-bottom: 10px;
        }
        .transfer-fields .form-group:last-child {
            margin-bottom: 0;
        }

        .tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            font-weight: 500;
            margin-left: 6px;
        }
        .tag-failure {
            background: #fee2e2;
            color: #d1453b;
        }
        .tag-transfer {
            background: #dbeafe;
            color: #2d7aff;
        }
        .tag-excluded {
            background: #fef3c7;
            color: #d97706;
        }

        @media (max-width: 1100px) {
            .charts-row {
                grid-template-columns: 1fr 1fr;
            }
            .charts-row .chart-box:last-child {
                grid-column: 1 / -1;
            }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 800px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .charts-row .chart-box:last-child {
                grid-column: auto;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .modal {
                padding: 24px 20px;
            }
        }
        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .stat-value {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📊 个人财务仪表盘</h1>
                <div class="subtitle">Notion 数据库实时同步</div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="addBtn">➕ 记账</button>
                <button class="btn btn-success" id="refreshBtn">🔄 刷新</button>
                <div class="status-badge" id="statusBadge">
                    <span class="dot loading" id="statusDot"></span>
                    <span id="statusText">加载中...</span>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="month-nav">
                <span class="month-nav-label">查看月份</span>
                <button class="btn-icon" id="prevMonth" title="上个月">‹</button>
                <input type="month" id="monthPicker" />
                <button class="btn-icon" id="nextMonth" title="下个月">›</button>
                <button class="btn-text" id="thisMonthBtn">本月</button>
            </div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">🏦 总资产</div>
                <div class="stat-value neutral" id="totalAssets">--</div>
                <div class="stat-sub">全部账户资产（不受月份筛选影响）</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 月总收入</div>
                <div class="stat-value positive" id="monthIncome">--</div>
                <div class="stat-sub" id="monthIncomeSub">本月收入合计</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 月可支出</div>
                <div class="stat-value neutral" id="monthAvailable">--</div>
                <div class="stat-sub">月总收入 -500-工资*10%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📉 月总支出</div>
                <div class="stat-value negative" id="monthExpense">--</div>
                <div class="stat-sub" id="monthExpenseSub">本月支出合计</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">✅ 月可结余</div>
                <div class="stat-value positive" id="monthBalance">--</div>
                <div class="stat-sub">可支出 - 实际支出</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏷️ 各账户余额</div>
                <div id="accountStats" style="text-align:left;padding:4px 8px;"></div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">📂 大类分布<span class="chart-title-month" id="titleMonth1"></span></div>
                <div class="legend-tip">
                    <span><span class="dot green"></span>收入</span>
                    <span><span class="dot red"></span>支出</span>
                    <span><span class="tag tag-excluded">⚠️ 承受型损失已过滤</span></span>
                    <span><span class="tag tag-transfer">🔄 转账已过滤</span></span>
                </div>
                <div id="chartCategory" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">🏷️ 小类分布<span class="chart-title-month" id="titleMonth2"></span></div>
                <div class="legend-tip">
                    <span><span class="dot green"></span>收入</span>
                    <span><span class="dot red"></span>支出</span>
                    <span><span class="tag tag-excluded">⚠️ 承受型损失已过滤</span></span>
                    <span><span class="tag tag-transfer">🔄 转账已过滤</span></span>
                </div>
                <div id="chartSubcategory" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">📈 月度趋势<span class="chart-title-month" id="titleMonth3"></span></div>
                <div class="legend-tip">
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#2d7aff;"></span> 收入
                    </span>
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#d1453b;"></span> 支出
                    </span>
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#22a67e;border:1px dashed #22a67e;"></span> 累计结余
                    </span>
                </div>
                <div id="chartTrend" class="chart-container"></div>
            </div>
        </div>
    </div>

    <!-- 记账弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ 记一笔</h2>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <form id="entryForm">
                <div class="form-group">
                    <label>日期 <span class="required">*</span></label>
                    <input type="date" id="formDate" required />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>金额 (¥) <span class="required">*</span></label>
                        <input type="number" id="formAmount" placeholder="0.00" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label>收支类型 <span class="required">*</span></label>
                        <select id="formType" required>
                            <option value="">请选择</option>
                            <option value="收入">收入</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>大类</label>
                        <select id="formCategory">
                            <option value="">请选择</option>
                            <option value="投资">投资</option>
                            <option value="生活消费">生活消费</option>
                            <option value="投资收益">投资收益</option>
                            <option value="工资">工资</option>
                            <option value="人情收入">人情收入</option>
                            <option value="人情支出">人情支出</option>
                            <option value="成长消费">成长消费</option>
                            <option value="失败消费">失败消费</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>小类</label>
                        <select id="formSubcategory">
                            <option value="">请选择</option>
                            <option value="衣装">衣装</option>
                            <option value="吃喝">吃喝</option>
                            <option value="玩乐">玩乐</option>
                            <option value="房费">房费</option>
                            <option value="通勤费">通勤费</option>
                            <option value="health">health</option>
                            <option value="生活固定消费">生活固定消费</option>
                            <option value="学习">学习</option>
                            <option value="核销">核销</option>
                            <option value="追加型损失">追加型损失</option>
                            <option value="承受型损失">承受型损失</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>账户</label>
                        <select id="formAccount">
                            <option value="">请选择</option>
                            <option value="余额宝">余额宝</option>
                            <option value="银行卡">银行卡</option>
                            <option value="零钱通">零钱通</option>
                            <option value="支付宝">支付宝</option>
                            <option value="微信">微信</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <input type="text" id="formNote" placeholder="可选" />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-checkbox">
                        <input type="checkbox" id="formIsFailure" />
                        <label for="formIsFailure">❌ 失败消费</label>
                    </div>
                    <div class="form-checkbox">
                        <input type="checkbox" id="formIsTransfer" />
                        <label for="formIsTransfer">🔄 账户转账</label>
                    </div>
                </div>

                <div class="transfer-fields" id="transferFields" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label>从账户 <span class="required">*</span></label>
                            <select id="formFromAccount" required>
                                <option value="">请选择</option>
                                <option value="余额宝">余额宝</option>
                                <option value="银行卡">银行卡</option>
                                <option value="零钱通">零钱通</option>
                                <option value="支付宝">支付宝</option>
                                <option value="微信">微信</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>到账户 <span class="required">*</span></label>
                            <select id="formToAccount" required>
                                <option value="">请选择</option>
                                <option value="余额宝">余额宝</option>
                                <option value="银行卡">银行卡</option>
                                <option value="零钱通">零钱通</option>
                                <option value="支付宝">支付宝</option>
                                <option value="微信">微信</option>
                            </select>
                        </div>
                    </div>
                    <div style="font-size:12px;color:#6b7a8f;margin-top:6px;">
                        💡 转账不会影响总资产，只改变各账户余额
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" id="modalCancel">取消</button>
                    <button type="submit" class="btn btn-primary" id="formSubmit">💾 保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = '/api/notion';
        const MONTHLY_SAVING_GOAL = 500;
        const FIXED_RATE = 0.10;

        let allRecords = [];
        let viewYear = new Date().getFullYear();
        let viewMonth = new Date().getMonth() + 1;

        // DOM 元素
        const modalOverlay = document.getElementById('modalOverlay');
        const formDate = document.getElementById('formDate');
        const formAmount = document.getElementById('formAmount');
        const formType = document.getElementById('formType');
        const formCategory = document.getElementById('formCategory');
        const formSubcategory = document.getElementById('formSubcategory');
        const formAccount = document.getElementById('formAccount');
        const formNote = document.getElementById('formNote');
        const formIsFailure = document.getElementById('formIsFailure');
        const formIsTransfer = document.getElementById('formIsTransfer');
        const formFromAccount = document.getElementById('formFromAccount');
        const formToAccount = document.getElementById('formToAccount');
        const transferFields = document.getElementById('transferFields');
        const entryForm = document.getElementById('entryForm');
        const monthPicker = document.getElementById('monthPicker');

        let pieCategoryChart, pieSubcategoryChart, trendChart;

        // ========== 工具函数 ==========
        function pad2(n) { return String(n).padStart(2, '0'); }

        function monthValue(y, m) { return `${y}-${pad2(m)}`; }

        function monthLabel(y, m) { return `${y}年${pad2(m)}月`; }

        function syncMonthPicker() {
            monthPicker.value = monthValue(viewYear, viewMonth);
            const label = `（${monthLabel(viewYear, viewMonth)}）`;
            document.getElementById('titleMonth1').textContent = label;
            document.getElementById('titleMonth2').textContent = label;
            document.getElementById('monthIncomeSub').textContent = monthLabel(viewYear, viewMonth) + ' 收入合计';
            document.getElementById('monthExpenseSub').textContent = monthLabel(viewYear, viewMonth) + ' 支出合计';
        }

        // ========== 核心判断函数 ==========

        /**
         * 判断一条记录是否应该计入收支统计（总收入/总支出）
         * 规则：
         * 1. 转账不计入
         * 2. 失败消费中"承受型损失"不计入
         * 3. 失败消费中"追加型损失"计入
         * 4. 普通收入/支出正常计入
         */
        function shouldCountForStats(record) {
            // 转账不计入收支
            if (record.isTransfer) return false;

            // 失败消费判断
            if (record.isFailure) {
                // 追加型损失计入
                if (record.subcategory === '追加型损失') return true;
                // 承受型损失不计入
                if (record.subcategory === '承受型损失') return false;
                // 其他失败消费默认不计入
                return false;
            }

            // 普通记录正常计入
            return true;
        }

        /**
         * 判断一条记录是否应该影响账户余额
         * 规则：
         * 1. 只有"承受型损失"不影响账户余额
         * 2. 其他所有记录（包括转账、追加型损失等）都影响账户余额
         */
        function shouldAffectAccountBalance(record) {
            // 只有承受型损失不影响账户余额
            if (record.isFailure && record.subcategory === '承受型损失') return false;
            return true;
        }

        /**
         * 计算账户余额
         * 遍历所有记录，根据规则累加各账户余额
         */
        function calculateAccountBalances(records) {
            const balances = {};

            for (const r of records) {
                // 判断是否影响账户余额
                if (!shouldAffectAccountBalance(r)) continue;

                if (r.isTransfer) {
                    // 转账：转出账户减少，转入账户增加
                    if (r.fromAccount) {
                        balances[r.fromAccount] = (balances[r.fromAccount] || 0) - r.amount;
                    }
                    if (r.toAccount) {
                        balances[r.toAccount] = (balances[r.toAccount] || 0) + r.amount;
                    }
                } else if (r.type === '收入') {
                    // 收入：账户增加
                    if (r.account) {
                        balances[r.account] = (balances[r.account] || 0) + r.amount;
                    }
                } else if (r.type === '支出') {
                    // 支出：账户减少
                    if (r.account) {
                        balances[r.account] = (balances[r.account] || 0) - r.amount;
                    }
                }
            }

            return balances;
        }

        /**
         * 计算总资产
         * 总资产 = 所有收入 - 所有支出（过滤掉转账和承受型损失）
         */
        function calculateTotalAssets(records) {
            let totalIncome = 0;
            let totalExpense = 0;

            for (const r of records) {
                if (!shouldCountForStats(r)) continue;

                if (r.type === '收入') {
                    totalIncome += r.amount;
                } else if (r.type === '支出') {
                    totalExpense += r.amount;
                }
            }

            return totalIncome - totalExpense;
        }

        /**
         * 计算月度统计数据
         */
        function calculateMonthlyStats(records, year, month) {
            // 筛选当月记录
            const monthRecords = records.filter(r => {
                if (!r.date) return false;
                const d = new Date(r.date);
                return d.getFullYear() === year && (d.getMonth() + 1) === month;
            });

            let monthIncome = 0;
            let monthExpense = 0;
            const categoryIncome = {};
            const categoryExpense = {};
            const subcategoryIncome = {};
            const subcategoryExpense = {};

            for (const r of monthRecords) {
                if (!shouldCountForStats(r)) continue;

                if (r.type === '收入') {
                    monthIncome += r.amount;
                    if (r.category) {
                        categoryIncome[r.category] = (categoryIncome[r.category] || 0) + r.amount;
                    }
                    if (r.subcategory) {
                        subcategoryIncome[r.subcategory] = (subcategoryIncome[r.subcategory] || 0) + r.amount;
                    }
                } else if (r.type === '支出') {
                    monthExpense += r.amount;
                    if (r.category) {
                        categoryExpense[r.category] = (categoryExpense[r.category] || 0) + r.amount;
                    }
                    if (r.subcategory) {
                        subcategoryExpense[r.subcategory] = (subcategoryExpense[r.subcategory] || 0) + r.amount;
                    }
                }
            }

            const monthAvailable = monthIncome - MONTHLY_SAVING_GOAL - monthIncome * FIXED_RATE;
            const monthBalance = monthAvailable - monthExpense;

            return {
                monthIncome,
                monthExpense,
                monthAvailable,
                monthBalance,
                categoryIncome,
                categoryExpense,
                subcategoryIncome,
                subcategoryExpense,
                recordCount: monthRecords.length
            };
        }

        /**
         * 构建月度趋势数据
         */
        function buildMonthlyTrend(records, endYear, endMonth, windowSize = 12) {
            if (!records || records.length === 0) return [];

            // 找最早记录
            let minDate = null;
            for (const r of records) {
                if (!r.date) continue;
                const d = new Date(r.date);
                if (!minDate || d < minDate) minDate = d;
            }
            if (!minDate) return [];

            const startYear = minDate.getFullYear();
            const startMonth = minDate.getMonth() + 1;

            // 生成月份列表
            const monthList = [];
            let y = startYear,
                m = startMonth;
            let safety = 0;
            while ((y < endYear || (y === endYear && m <= endMonth)) && safety < 1200) {
                monthList.push({ year: y, month: m });
                m += 1;
                if (m > 12) { m = 1;
                    y += 1; }
                safety += 1;
            }

            // 按月聚合
            const monthMap = {};
            for (const r of records) {
                if (!shouldCountForStats(r)) continue;
                if (!r.date) continue;
                const d = new Date(r.date);
                const key = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;
                if (!monthMap[key]) monthMap[key] = { income: 0, expense: 0 };
                if (r.type === '收入') monthMap[key].income += r.amount;
                else if (r.type === '支出') monthMap[key].expense += r.amount;
            }

            let cumBalance = 0;
            const full = monthList.map(({ year, month }) => {
                const key = `${year}-${pad2(month)}`;
                const income = (monthMap[key] && monthMap[key].income) || 0;
                const expense = (monthMap[key] && monthMap[key].expense) || 0;
                cumBalance += (income - expense);
                return {
                    year,
                    month,
                    label: `${year}-${pad2(month)}`,
                    income,
                    expense,
                    cumBalance
                };
            });

            return full.slice(-windowSize);
        }

        // ========== 渲染函数 ==========

        function renderStats(totalAssets, monthlyStats) {
            document.getElementById('totalAssets').textContent = '¥' + totalAssets.toFixed(0);
            document.getElementById('monthIncome').textContent = '¥' + monthlyStats.monthIncome.toFixed(0);
            document.getElementById('monthAvailable').textContent = '¥' + monthlyStats.monthAvailable.toFixed(0);
            document.getElementById('monthExpense').textContent = '¥' + monthlyStats.monthExpense.toFixed(0);

            const el = document.getElementById('monthBalance');
            el.textContent = '¥' + monthlyStats.monthBalance.toFixed(0);
            el.className = 'stat-value ' + (monthlyStats.monthBalance >= 0 ? 'positive' : 'negative');
        }

        function renderAccountBalances(balances) {
            const container = document.getElementById('accountStats');
            if (!container) return;

            const sorted = Object.entries(balances).sort((a, b) => b[1] - a[1]);

            if (sorted.length === 0) {
                container.innerHTML = '<div style="color:#8a9aa8;font-size:13px;text-align:center;">暂无账户数据</div>';
                return;
            }

            let html = '';
            for (const [account, balance] of sorted) {
                const color = balance > 0 ? 'positive' : (balance < 0 ? 'negative' : 'neutral');
                html += `
                    <div class="account-item">
                        <span class="name">${account}</span>
                        <span class="balance ${color}">¥${balance.toFixed(0)}</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function renderPie(domId, incomeData, expenseData, existing) {
            const dom = document.getElementById(domId);
            if (!dom) return existing;

            try {
                const chart = existing || echarts.init(dom);
                const data = [];

                if (incomeData && typeof incomeData === 'object') {
                    for (const [k, v] of Object.entries(incomeData)) {
                        if (v > 0) {
                            data.push({
                                name: k + ' (收入)',
                                value: v,
                                itemStyle: { borderColor: '#22a67e', borderWidth: 3 }
                            });
                        }
                    }
                }

                if (expenseData && typeof expenseData === 'object') {
                    for (const [k, v] of Object.entries(expenseData)) {
                        if (v > 0) {
                            data.push({
                                name: k + ' (支出)',
                                value: v,
                                itemStyle: { borderColor: '#d1453b', borderWidth: 3 }
                            });
                        }
                    }
                }

                if (data.length === 0) {
                    chart.setOption({
                        title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a9aa8',
                                fontSize: 14, fontWeight: 400 } },
                        series: [{ type: 'pie', data: [] }]
                    }, true);
                    return chart;
                }

                chart.setOption({
                    title: { text: '' },
                    tooltip: { trigger: 'item', formatter: '{b}<br/>¥{c} ({d}%)' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '68%'],
                        itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                        label: { show: true, formatter: '{b}\n¥{c}', fontSize: 11 },
                        data: data,
                    }],
                    color: ['#2d7aff', '#4a8aff', '#6b9cff', '#8fb0ff', '#b3c8ff',
                        '#ff6b6b', '#ff8a8a', '#ffa8a8', '#ffc8c8', '#ffe0e0'
                    ],
                }, true);
                return chart;
            } catch (e) {
                console.warn('renderPie error:', e);
                return existing;
            }
        }

        function renderTrend(domId, trendData, existing) {
            const dom = document.getElementById(domId);
            if (!dom) return existing;

            try {
                const chart = existing || echarts.init(dom);

                if (!trendData || !Array.isArray(trendData) || trendData.length === 0) {
                    chart.setOption({
                        title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a9aa8',
                                fontSize: 14, fontWeight: 400 } },
                        xAxis: { type: 'category', data: [] },
                        yAxis: { type: 'value' },
                        series: []
                    }, true);
                    return chart;
                }

                const hasData = trendData.some(d => d.income > 0 || d.expense > 0 || d.cumBalance !== 0);
                if (!hasData) {
                    chart.setOption({
                        title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a9aa8',
                                fontSize: 14, fontWeight: 400 } },
                        xAxis: { type: 'category', data: trendData.map(d => d.label || '') },
                        yAxis: { type: 'value' },
                        series: []
                    }, true);
                    return chart;
                }

                chart.setOption({
                    title: { text: '' },
                    tooltip: {
                        trigger: 'axis',
                        formatter: function(params) {
                            if (!params || params.length === 0) return '';
                            let html = '<strong>' + (params[0].axisValue || '') + '</strong><br/>';
                            for (const p of params) {
                                if (p && p.seriesName !== undefined && p.value !== undefined) {
                                    html += p.marker + ' ' + p.seriesName + ': ¥' + Math.round(p.value) + '<br/>';
                                }
                            }
                            return html;
                        }
                    },
                    legend: { data: ['收入', '支出', '累计结余'], bottom: 0, left: 'center' },
                    grid: { left: 50, right: 20, top: 20, bottom: 50 },
                    xAxis: {
                        type: 'category',
                        data: trendData.map(d => d.label || ''),
                        axisLabel: { fontSize: 11 }
                    },
                    yAxis: {
                        type: 'value',
                        axisLabel: { formatter: '¥{value}', fontSize: 11 },
                        splitLine: { lineStyle: { color: '#edf2f7', type: 'dashed' } }
                    },
                    series: [{
                        name: '收入',
                        type: 'line',
                        data: trendData.map(d => d.income || 0),
                        smooth: true,
                        lineStyle: { color: '#2d7aff', width: 2.5 },
                        areaStyle: { color: 'rgba(45,122,255,0.10)' },
                    }, {
                        name: '支出',
                        type: 'line',
                        data: trendData.map(d => d.expense || 0),
                        smooth: true,
                        lineStyle: { color: '#d1453b', width: 2.5 },
                        areaStyle: { color: 'rgba(209,69,59,0.08)' },
                    }, {
                        name: '累计结余',
                        type: 'line',
                        data: trendData.map(d => d.cumBalance || 0),
                        smooth: true,
                        lineStyle: { color: '#22a67e', width: 2, type: 'dashed' },
                    }],
                }, true);
                return chart;
            } catch (e) {
                console.warn('renderTrend error:', e);
                return existing;
            }
        }

        function renderAll(records) {
            // 1. 计算总资产
            const totalAssets = calculateTotalAssets(records);

            // 2. 计算月度统计
            const monthlyStats = calculateMonthlyStats(records, viewYear, viewMonth);

            // 3. 计算账户余额
            const accountBalances = calculateAccountBalances(records);

            // 4. 渲染统计卡片
            renderStats(totalAssets, monthlyStats);

            // 5. 渲染账户余额
            renderAccountBalances(accountBalances);

            // 6. 渲染饼图
            pieCategoryChart = renderPie('chartCategory', monthlyStats.categoryIncome, monthlyStats.categoryExpense,
                pieCategoryChart);
            pieSubcategoryChart = renderPie('chartSubcategory', monthlyStats.subcategoryIncome, monthlyStats
                .subcategoryExpense, pieSubcategoryChart);

            // 7. 渲染趋势图
            const trendData = buildMonthlyTrend(records, viewYear, viewMonth, 12);
            trendChart = renderTrend('chartTrend', trendData, trendChart);

            // 8. 更新月份标题
            const titleMonth3 = document.getElementById('titleMonth3');
            if (trendData && trendData.length > 0) {
                titleMonth3.textContent =
                `（${trendData[0].label} ~ ${trendData[trendData.length - 1].label}）`;
            } else {
                titleMonth3.textContent = '';
            }

            // 9. 更新状态
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'dot success';
            txt.textContent = '✅ 共 ' + (records ? records.length : 0) + ' 条记录，本月 ' + (monthlyStats.recordCount || 0) +
                ' 条';
        }

        // ========== 表单交互 ==========

        // 转账复选框切换
        formIsTransfer.addEventListener('change', function() {
            if (this.checked) {
                transferFields.style.display = 'block';
                formType.disabled = true;
                formType.value = '';
                formCategory.value = '';
                formSubcategory.value = '';
                formIsFailure.checked = false;
            } else {
                transferFields.style.display = 'none';
                formType.disabled = false;
            }
        });

        // 失败消费复选框切换
        formIsFailure.addEventListener('change', function() {
            if (this.checked && !formIsTransfer.checked) {
                formCategory.value = '失败消费';
                formSubcategory.value = '追加型损失';
            } else if (!this.checked && !formIsTransfer.checked) {
                if (formCategory.value === '失败消费') {
                    formCategory.value = '';
                    formSubcategory.value = '';
                }
            }
        });

        // 小类改变时自动勾选失败消费
        formSubcategory.addEventListener('change', function() {
            if ((this.value === '承受型损失' || this.value === '追加型损失') && !formIsTransfer.checked) {
                if (!formIsFailure.checked) {
                    formIsFailure.checked = true;
                    formCategory.value = '失败消费';
                }
            }
        });

        // ========== 月份切换 ==========

        monthPicker.addEventListener('change', () => {
            const [y, m] = monthPicker.value.split('-').map(Number);
            if (!y || !m) return;
            viewYear = y;
            viewMonth = m;
            syncMonthPicker();
            renderAll(allRecords);
        });

        document.getElementById('prevMonth').addEventListener('click', () => {
            viewMonth -= 1;
            if (viewMonth < 1) { viewMonth = 12;
                viewYear -= 1; }
            syncMonthPicker();
            renderAll(allRecords);
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            viewMonth += 1;
            if (viewMonth > 12) { viewMonth = 1;
                viewYear += 1; }
            syncMonthPicker();
            renderAll(allRecords);
        });

        document.getElementById('thisMonthBtn').addEventListener('click', () => {
            const n = new Date();
            viewYear = n.getFullYear();
            viewMonth = n.getMonth() + 1;
            syncMonthPicker();
            renderAll(allRecords);
        });

        // ========== 打开/关闭弹窗 ==========

        document.getElementById('addBtn').addEventListener('click', () => {
            formDate.value = new Date().toISOString().split('T')[0];
            formAmount.value = '';
            formType.value = '';
            formType.disabled = false;
            formCategory.value = '';
            formSubcategory.value = '';
            formAccount.value = '';
            formNote.value = '';
            formIsFailure.checked = false;
            formIsTransfer.checked = false;
            formFromAccount.value = '';
            formToAccount.value = '';
            transferFields.style.display = 'none';
            modalOverlay.classList.add('active');
        });

        document.getElementById('modalClose').addEventListener('click', () => modalOverlay.classList.remove('active'));
        document.getElementById('modalCancel').addEventListener('click', () => modalOverlay.classList.remove('active'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('active');
        });

        // ========== 表单提交 ==========

        entryForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const isFailure = formIsFailure.checked;
            const isTransfer = formIsTransfer.checked;
            const fromAccount = formFromAccount.value;
            const toAccount = formToAccount.value;

            // 验证转账
            if (isTransfer) {
                if (!fromAccount || !toAccount) {
                    alert('请选择转出和转入账户');
                    return;
                }
                if (fromAccount === toAccount) {
                    alert('转出和转入账户不能相同');
                    return;
                }
            }

            const amount = parseFloat(formAmount.value);
            if (isNaN(amount) || amount <= 0) {
                alert('请输入有效的金额');
                return;
            }

            // 构建数据
            let data = {
                date: formDate.value,
                amount: amount,
                note: formNote.value || '',
                isFailure: isFailure,
                isTransfer: isTransfer,
            };

            if (isTransfer) {
                // 转账记录
                data.type = '转账';
                data.category = '转账';
                data.subcategory = '账户间转账';
                data.account = '';
                data.fromAccount = fromAccount;
                data.toAccount = toAccount;
            } else {
                // 普通记录
                data.type = formType.value;
                data.category = formCategory.value;
                data.subcategory = formSubcategory.value;
                data.account = formAccount.value;
                data.fromAccount = '';
                data.toAccount = '';

                if (!data.type) {
                    alert('请选择收支类型');
                    return;
                }

                // 如果是失败消费但没有小类，设置默认
                if (isFailure && !data.subcategory) {
                    data.subcategory = '追加型损失';
                }
            }

            const btn = document.getElementById('formSubmit');
            btn.textContent = '⏳...';
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                const result = await res.json();
                if (!result.success) throw new Error(result.error || '保存失败');

                alert('✅ 记账成功');
                modalOverlay.classList.remove('active');

                const d = new Date(data.date);
                viewYear = d.getFullYear();
                viewMonth = d.getMonth() + 1;
                syncMonthPicker();
                loadData();
            } catch (err) {
                alert('❌ ' + err.message);
            } finally {
                btn.textContent = '💾 保存';
                btn.disabled = false;
            }
        });

        // ========== 数据加载 ==========

        async function fetchData() {
            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('请求失败 (' + res.status + ')');
            const result = await res.json();
            if (!result.success) throw new Error(result.error || '未知错误');
            return result.data || [];
        }

        async function loadData() {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            try {
                dot.className = 'dot loading';
                txt.textContent = '加载中...';
                const data = await fetchData();
                allRecords = data || [];
                renderAll(allRecords);
            } catch (err) {
                dot.className = 'dot error';
                txt.textContent = '❌ ' + err.message;
                console.error('loadData error:', err);
            }
        }

        // ========== 窗口自适应 ==========

        window.addEventListener('resize', () => {
            try {
                pieCategoryChart && pieCategoryChart.resize();
                pieSubcategoryChart && pieSubcategoryChart.resize();
                trendChart && trendChart.resize();
            } catch (e) {
                // ignore
            }
        });

        // ========== 启动 ==========

        document.getElementById('refreshBtn').addEventListener('click', loadData);
        syncMonthPicker();
        loadData();
    </script>
</body>
</html>
