<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人财务仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fb;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1440px;
            width: 100%;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a2634;
        }
        .header-left .subtitle {
            color: #6b7a8f;
            font-size: 14px;
            margin-top: 4px;
        }
        .status-badge {
            background: white;
            border-radius: 40px;
            padding: 8px 24px;
            border: 1px solid #e2e8f0;
            font-size: 13px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-badge .dot.loading {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        .status-badge .dot.success {
            background: #22a67e;
        }
        .status-badge .dot.error {
            background: #d1453b;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* 五个指标卡 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 18px 12px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            text-align: center;
            transition: 0.2s;
        }
        .stat-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        .stat-label {
            font-size: 13px;
            font-weight: 500;
            color: #6b7a8f;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0b1a2b;
            letter-spacing: -0.3px;
        }
        .stat-value.positive {
            color: #0c8f5e;
        }
        .stat-value.negative {
            color: #d1453b;
        }
        .stat-value.neutral {
            color: #2d3748;
        }
        .stat-sub {
            font-size: 12px;
            color: #8a9aa8;
            margin-top: 4px;
        }

        /* 图表三列 */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 8px;
        }
        .chart-box {
            background: white;
            border-radius: 16px;
            padding: 16px 12px 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
        }
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #1a2634;
            padding-left: 4px;
            margin-bottom: 2px;
        }
        .chart-container {
            width: 100%;
            height: 340px;
        }
        .legend-tip {
            font-size: 12px;
            color: #6b7a8f;
            padding: 0 4px 6px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .legend-tip .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 3px;
            margin-right: 4px;
        }
        .legend-tip .dot.green {
            border: 3px solid #22a67e;
            background: transparent;
        }
        .legend-tip .dot.red {
            border: 3px solid #d1453b;
            background: transparent;
        }

        @media (max-width: 1100px) {
            .charts-row {
                grid-template-columns: 1fr 1fr;
            }
            .charts-row .chart-box:last-child {
                grid-column: 1 / -1;
            }
        }
        @media (max-width: 800px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .charts-row .chart-box:last-child {
                grid-column: auto;
            }
        }
        @media (max-width: 500px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-value {
                font-size: 22px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left">
                <h1>📊 个人财务仪表盘</h1>
                <div class="subtitle">Notion 数据库实时同步</div>
            </div>
            <div class="status-badge" id="statusBadge">
                <span class="dot loading" id="statusDot"></span>
                <span id="statusText">加载中...</span>
            </div>
        </div>

        <!-- 五个指标卡 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">🏦 存款总额</div>
                <div class="stat-value neutral" id="totalAssets">--</div>
                <div class="stat-sub">所有账户资产</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 月总收入</div>
                <div class="stat-value positive" id="monthIncome">--</div>
                <div class="stat-sub">本月收入合计</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💰 月可支出</div>
                <div class="stat-value neutral" id="monthAvailable">--</div>
                <div class="stat-sub">总收入 - 强制储蓄(20%) - 10%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📉 月总支出</div>
                <div class="stat-value negative" id="monthExpense">--</div>
                <div class="stat-sub">本月支出合计</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">✅ 月可结余</div>
                <div class="stat-value positive" id="monthBalance">--</div>
                <div class="stat-sub">可支出 - 实际支出</div>
            </div>
        </div>

        <!-- 图表三列 -->
        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">📂 大类分布</div>
                <div class="legend-tip">
                    <span><span class="dot green"></span>收入</span>
                    <span><span class="dot red"></span>支出</span>
                </div>
                <div id="chartCategory" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">🏷️ 小类分布</div>
                <div class="legend-tip">
                    <span><span class="dot green"></span>收入</span>
                    <span><span class="dot red"></span>支出</span>
                </div>
                <div id="chartSubcategory" class="chart-container"></div>
            </div>
            <div class="chart-box">
                <div class="chart-title">📈 月度趋势</div>
                <div class="legend-tip">
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#2d7aff;"></span> 收入
                    </span>
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#d1453b;"></span> 支出
                    </span>
                    <span style="display:inline-flex;align-items:center;gap:4px;">
                        <span style="display:inline-block;width:20px;height:3px;background:#22a67e;border:1px dashed #22a67e;"></span> 累计结余
                    </span>
                </div>
                <div id="chartTrend" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const API_URL = '/api/notion';
        const FORCED_SAVING_RATE = 0.20;

        // ============================================================
        // 获取数据
        // ============================================================
        async function fetchData() {
            const response = await fetch(API_URL);
            if (!response.ok) {
                throw new Error(`API 请求失败: ${response.status}`);
            }
            const result = await response.json();
            if (!result.success) {
                throw new Error(result.error || '未知错误');
            }
            return result.data;
        }

        // ============================================================
        // 处理数据
        // ============================================================
        function processRecords(records) {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();

            // 本月数据
            const monthRecords = records.filter(r => {
                if (!r.date) return false;
                const d = new Date(r.date);
                return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
            });

            // 总资产
            let totalIncome = 0,
                totalExpense = 0;
            for (const r of records) {
                if (r.type === '收入') totalIncome += r.amount;
                else if (r.type === '支出') totalExpense += r.amount;
            }
            const totalAssets = totalIncome - totalExpense;

            // 本月统计
            let monthIncome = 0,
                monthExpense = 0;
            const dailyIncome = {},
                dailyExpense = {};
            const categoryIncome = {},
                categoryExpense = {};
            const subcategoryIncome = {},
                subcategoryExpense = {};

            for (const r of monthRecords) {
                const amount = r.amount || 0;
                if (r.type === '收入') {
                    monthIncome += amount;
                    dailyIncome[r.date] = (dailyIncome[r.date] || 0) + amount;
                    const cat = r.category || '未分类';
                    categoryIncome[cat] = (categoryIncome[cat] || 0) + amount;
                    const sub = r.subcategory || '未分类';
                    subcategoryIncome[sub] = (subcategoryIncome[sub] || 0) + amount;
                } else if (r.type === '支出') {
                    monthExpense += amount;
                    dailyExpense[r.date] = (dailyExpense[r.date] || 0) + amount;
                    const cat = r.category || '未分类';
                    categoryExpense[cat] = (categoryExpense[cat] || 0) + amount;
                    const sub = r.subcategory || '未分类';
                    subcategoryExpense[sub] = (subcategoryExpense[sub] || 0) + amount;
                }
            }

            // 月可支出
            const forcedSaving = monthIncome * FORCED_SAVING_RATE;
            const reserve = monthIncome * 0.10;
            const monthAvailable = monthIncome - forcedSaving - reserve;
            const monthBalance = monthAvailable - monthExpense;

            // 趋势图数据（本月1号到今天）
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = now.getDate();
            const dateList = [];
            for (let d = 1; d <= Math.min(daysInMonth, today); d++) {
                const dateStr =
                    `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                dateList.push(dateStr);
            }

            let cumBalance = 0;
            const trend = dateList.map(date => {
                const income = dailyIncome[date] || 0;
                const expense = dailyExpense[date] || 0;
                cumBalance += (income - expense);
                return { date, income, expense, cumBalance };
            });

            return {
                totalAssets,
                monthIncome,
                monthExpense,
                monthAvailable,
                monthBalance,
                categoryIncome,
                categoryExpense,
                subcategoryIncome,
                subcategoryExpense,
                trend,
                recordCount: monthRecords.length,
            };
        }

        // ============================================================
        // 渲染
        // ============================================================
        function renderStats(stats) {
            document.getElementById('totalAssets').textContent = '¥' + stats.totalAssets.toFixed(0);
            document.getElementById('monthIncome').textContent = '¥' + stats.monthIncome.toFixed(0);
            document.getElementById('monthAvailable').textContent = '¥' + stats.monthAvailable.toFixed(0);
            document.getElementById('monthExpense').textContent = '¥' + stats.monthExpense.toFixed(0);

            const balanceEl = document.getElementById('monthBalance');
            balanceEl.textContent = '¥' + stats.monthBalance.toFixed(0);
            balanceEl.className = 'stat-value ' + (stats.monthBalance >= 0 ? 'positive' : 'negative');
        }

        function renderPieChart(domId, incomeData, expenseData) {
            const dom = document.getElementById(domId);
            if (!dom) return;
            const chart = echarts.init(dom);

            const seriesData = [];
            for (const [name, value] of Object.entries(incomeData)) {
                if (value > 0) {
                    seriesData.push({ name: name + ' (收入)', value, itemStyle: { borderColor: '#22a67e', borderWidth: 3 } });
                }
            }
            for (const [name, value] of Object.entries(expenseData)) {
                if (value > 0) {
                    seriesData.push({ name: name + ' (支出)', value, itemStyle: { borderColor: '#d1453b', borderWidth: 3 } });
                }
            }

            if (seriesData.length === 0) {
                chart.setOption({ title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a9aa8',
                            fontSize: 14, fontWeight: 400 } } });
                return;
            }

            chart.setOption({
                tooltip: { trigger: 'item', formatter: '{b}<br/>¥{c} ({d}%)' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '68%'],
                    avoidLabelOverlap: true,
                    itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                    label: { show: true, formatter: '{b}\n¥{c}', fontSize: 11, lineHeight: 16 },
                    data: seriesData,
                }],
                color: ['#2d7aff', '#4a8aff', '#6b9cff', '#8fb0ff', '#b3c8ff',
                    '#ff6b6b', '#ff8a8a', '#ffa8a8', '#ffc8c8', '#ffe0e0'
                ],
            });
            window.addEventListener('resize', () => chart.resize());
        }

        function renderTrendChart(domId, trendData) {
            const dom = document.getElementById(domId);
            if (!dom) return;
            const chart = echarts.init(dom);

            if (!trendData || trendData.length === 0) {
                chart.setOption({ title: { text: '暂无数据', left: 'center', top: 'center', textStyle: { color: '#8a9aa8',
                            fontSize: 14, fontWeight: 400 } } });
                return;
            }

            chart.setOption({
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        let html = `<strong>${params[0].axisValue}</strong><br/>`;
                        for (const p of params) {
                            html += `${p.marker} ${p.seriesName}: ¥${p.value.toFixed(0)}<br/>`;
                        }
                        return html;
                    },
                },
                legend: { data: ['收入', '支出', '累计结余'], bottom: 0, left: 'center' },
                grid: { left: 50, right: 20, top: 20, bottom: 50 },
                xAxis: { type: 'category', data: trendData.map(d => d.date.slice(5)), axisLabel: { fontSize: 11 } },
                yAxis: { type: 'value', axisLabel: { formatter: '¥{value}', fontSize: 11 }, splitLine: { lineStyle: {
                            color: '#edf2f7', type: 'dashed' } } },
                series: [{
                    name: '收入',
                    type: 'line',
                    data: trendData.map(d => d.income),
                    smooth: true,
                    lineStyle: { color: '#2d7aff', width: 2.5 },
                    areaStyle: { color: 'rgba(45, 122, 255, 0.10)' },
                }, {
                    name: '支出',
                    type: 'line',
                    data: trendData.map(d => d.expense),
                    smooth: true,
                    lineStyle: { color: '#d1453b', width: 2.5 },
                    areaStyle: { color: 'rgba(209, 69, 59, 0.08)' },
                }, {
                    name: '累计结余',
                    type: 'line',
                    data: trendData.map(d => d.cumBalance),
                    smooth: true,
                    lineStyle: { color: '#22a67e', width: 2, type: 'dashed' },
                }],
            });
            window.addEventListener('resize', () => chart.resize());
        }

        // ============================================================
        // 主流程
        // ============================================================
        async function main() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            try {
                statusDot.className = 'dot loading';
                statusText.textContent = '加载中...';

                const records = await fetchData();
                const stats = processRecords(records);

                renderStats(stats);
                renderPieChart('chartCategory', stats.categoryIncome, stats.categoryExpense);
                renderPieChart('chartSubcategory', stats.subcategoryIncome, stats.subcategoryExpense);
                renderTrendChart('chartTrend', stats.trend);

                statusDot.className = 'dot success';
                statusText.textContent = `✅ 已加载 ${stats.recordCount} 条本月记录`;

            } catch (error) {
                console.error('加载失败:', error);
                statusDot.className = 'dot error';
                statusText.textContent = '❌ ' + error.message;
            }
        }

        // 启动
        main();
    </script>
</body>
</html>
